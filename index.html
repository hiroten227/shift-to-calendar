<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勤務行路登録</title>
  <style>
    body{
      font-family:sans-serif;
      padding:16px;
      max-width:900px;
      margin:0 auto;
    }
    h2,h3{
      margin-top:0;
    }
    .card{
      border:1px solid #ccc;
      border-radius:10px;
      padding:12px;
      margin-bottom:16px;
    }
    label{
      display:block;
      font-weight:bold;
      margin-bottom:6px;
    }
    input, button{
      width:100%;
      box-sizing:border-box;
      padding:10px;
      font-size:16px;
      margin-bottom:10px;
    }
    button{
      cursor:pointer;
    }
    img{
      max-width:100%;
      border:1px solid #ccc;
      border-radius:8px;
      display:block;
      margin-top:10px;
    }
    table{
      border-collapse:collapse;
      width:100%;
    }
    td,th{
      border:1px solid #ccc;
      padding:8px;
      text-align:center;
    }
    .register{
      background:#d7f7d7;
    }
    .skip{
      background:#eeeeee;
    }
    .reject{
      background:#ffd6d6;
    }
    .hidden{
      display:none;
    }
    .status{
      padding:10px;
      border-radius:8px;
      background:#f5f5f5;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>

  <h2>勤務行路登録</h2>

  <div class="card">
    <label for="targetMonth">対象月</label>
    <input type="month" id="targetMonth" />

    <label for="imageInput">勤務表画像</label>
    <input type="file" id="imageInput" accept="image/*" capture="environment" />

    <button id="previewBtn" type="button">画像を確認</button>

    <div id="previewArea" class="hidden">
      <p>画像プレビュー</p>
      <img id="previewImage" alt="勤務表画像プレビュー" />
    </div>
  </div>

  <div class="card">
    <button id="loadSampleBtn" type="button">サンプル結果を表示</button>
    <button id="registerSampleBtn" type="button">サンプル結果をGASへ送信して登録</button>
    <div id="statusBox" class="status">待機中</div>
  </div>

  <div class="card">
    <h3>勤務確認</h3>
    <table id="resultTable">
      <tr>
        <th>日</th>
        <th>勤務</th>
        <th>判定</th>
        <th>時刻</th>
      </tr>
    </table>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw6C0KGZGBJuG3c7fDrN5US3SOBcHbP1LxchoTooFRgO4j8sH49cq4_BG--0aoE50P3YA/exec";

    const targetMonth = document.getElementById("targetMonth");
    const imageInput = document.getElementById("imageInput");
    const previewBtn = document.getElementById("previewBtn");
    const previewArea = document.getElementById("previewArea");
    const previewImage = document.getElementById("previewImage");
    const loadSampleBtn = document.getElementById("loadSampleBtn");
    const registerSampleBtn = document.getElementById("registerSampleBtn");
    const resultTable = document.getElementById("resultTable");
    const statusBox = document.getElementById("statusBox");

    const now = new Date();
    targetMonth.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;

    let currentItems = [];

    previewBtn.addEventListener("click", () => {
      const file = imageInput.files[0];
      if (!file) {
        alert("先に勤務表画像を選んでください。");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        previewImage.src = e.target.result;
        previewArea.classList.remove("hidden");
      };
      reader.readAsDataURL(file);
    });

    loadSampleBtn.addEventListener("click", () => {
      currentItems = [
        {date:1, raw:"401", normalized:"401", status:"REGISTER", start:"8:57", end:"9:06", allDay:false},
        {date:2, raw:"公休", normalized:"公休", status:"SKIP", start:"", end:"", allDay:false},
        {date:3, raw:"臨1900", normalized:"臨1900", status:"REGISTER", start:"", end:"", allDay:true},
        {date:4, raw:"変7d", normalized:"変7d", status:"REGISTER", start:"09:00", end:"17:45", allDay:false}
      ];

      renderTable(currentItems);
      statusBox.textContent = "サンプル結果を表示しました。";
    });

    registerSampleBtn.addEventListener("click", async () => {
      try {
        if (!targetMonth.value) {
          alert("対象月を選んでください。");
          return;
        }

        if (!currentItems.length) {
          alert("先に「サンプル結果を表示」を押してください。");
          return;
        }

        statusBox.textContent = "GASへ送信中...";

        const [year, month] = targetMonth.value.split("-").map(Number);

        const payload = {
          targetYear: year,
          targetMonth: month,
          base64Image: "",
          results: currentItems.map(item => ({
            date: item.date,
            raw: item.raw
          }))
        };

        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("GASからJSONではない応答が返りました: " + text);
        }

        if (data.ok) {
          statusBox.textContent = "登録成功\n" + data.reason;
        } else {
          statusBox.textContent = "登録失敗\n" + data.reason;
        }

        if (data.items) {
          renderTable(data.items);
        }

      } catch (err) {
        statusBox.textContent = "エラー\n" + err.message;
        console.error(err);
      }
    });

    function renderTable(items) {
      while (resultTable.rows.length > 1) {
        resultTable.deleteRow(1);
      }

      items.forEach(item => {
        const tr = document.createElement("tr");

        if (item.status === "REGISTER") tr.className = "register";
        if (item.status === "SKIP") tr.className = "skip";
        if (item.status === "REJECT") tr.className = "reject";

        const timeText = item.allDay
          ? "終日"
          : (item.start && item.end ? `${item.start}-${item.end}` : "");

        tr.innerHTML = `
          <td>${item.date}</td>
          <td>${item.normalized || item.raw || ""}</td>
          <td>${item.status || ""}</td>
          <td>${timeText}</td>
        `;

        resultTable.appendChild(tr);
      });
    }
  </script>
</body>
</html>
