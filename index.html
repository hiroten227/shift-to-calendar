<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勤務シフト → Googleカレンダー</title>

  <style>
    :root {
      --bg:#f6f7fb; --card:#fff; --line:#e5e7eb;
      --text:#111827; --muted:#6b7280;
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      margin:0; background:var(--bg); color:var(--text);
    }
    header { padding:16px; background:#fff; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:18px; }
    main { padding:16px; display:grid; gap:12px; max-width:720px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; }
    .row { display:flex; justify-content:space-between; gap:10px; font-size:14px; align-items:center; }
    .label { color:var(--muted); }
    .value { font-weight:800; }
    .note { color:var(--muted); font-size:12px; line-height:1.5; margin-top:8px; }
    input[type="month"], input[type="date"], input[type="text"]{
      width:100%; padding:10px 12px; border-radius:12px; border:1px solid #d1d5db;
      background:#fff; font-size:15px; box-sizing:border-box;
    }
    button{
      width:100%; padding:12px 14px; border-radius:12px; border:1px solid #d1d5db;
      background:#111827; color:#fff; font-size:15px; font-weight:900;
    }
    .btn-sub{ background:#fff; color:#111827; }
    .grid{ display:grid; gap:10px; }
    .pill{
      display:inline-flex; align-items:center; gap:6px;
      font-size:12px; padding:4px 10px; border-radius:999px;
      border:1px solid var(--line); background:#fff; color:var(--text);
    }
    .pill.ok{ border-color:#bbf7d0; background:#f0fdf4; }
    .pill.warn{ border-color:#fde68a; background:#fffbeb; }
    .pill.off{ border-color:#e5e7eb; background:#f9fafb; color:#374151; }
    .pill.err{ border-color:#fecaca; background:#fef2f2; }
    .item{ padding:10px 0; border-top:1px solid var(--line); }
    .item:first-child{ border-top:none; padding-top:0; }
    .mono{ font-family: ui-monospace, Menlo, Consolas, monospace; }
    .small{ font-size:12px; color:var(--muted); }
  </style>
</head>

<body>
<header>
  <h1>勤務シフト → Googleカレンダー</h1>
</header>

<main>

  <!-- 対象月 -->
  <div class="card">
    <div class="row">
      <div class="label">対象月</div>
      <div class="value" id="monthLabel">未選択</div>
    </div>
    <div style="height:10px"></div>
    <input id="monthInput" type="month" />
  </div>

  <!-- 勤務マスタ -->
  <div class="card">
    <div class="row">
      <div class="label">使用中の勤務マスタ</div>
      <div class="value" id="masterLabel">読み込み中…</div>
    </div>
    <div class="note">
      通常行路は自動入力。<br>
      <b>臨◯◯</b>・<b>変◯◯</b>・未登録は手動入力。<br>
      <b>変7d</b> のようにマスタ登録済みは自動。<br>
      <b>-</b> は非番。
    </div>
  </div>

  <!-- テスト入力 -->
  <div class="card">
    <div style="font-weight:900">テスト入力（OCRの代わり）</div>
    <div class="grid" style="margin-top:10px;">
      <input id="dateInput" type="date" />
      <input id="dutyInput" type="text" placeholder="行路名（401 / - / 臨1900 / 変401 / 変7d）" />
      <button id="btnAdd">追加</button>
      <button id="btnClear" class="btn-sub">全消去</button>
    </div>
  </div>

  <!-- プレビュー -->
  <div class="card">
    <div style="font-weight:900">プレビュー</div>
    <div id="previewArea" class="note">まだ入力がありません。</div>
  </div>

</main>

<script>
/* ========= 初期設定 ========= */
const monthInput = document.getElementById("monthInput");
const monthLabel = document.getElementById("monthLabel");
const masterLabel = document.getElementById("masterLabel");
const dateInput = document.getElementById("dateInput");
const dutyInput = document.getElementById("dutyInput");
const btnAdd = document.getElementById("btnAdd");
const btnClear = document.getElementById("btnClear");
const previewArea = document.getElementById("previewArea");

let master = null;
let items = [];

/* ========= 日付初期化 ========= */
const now = new Date();
monthInput.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
monthLabel.textContent = `${now.getFullYear()}年${now.getMonth()+1}月`;
dateInput.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

monthInput.addEventListener("change", () => {
  const [y,m] = monthInput.value.split("-");
  monthLabel.textContent = `${y}年${Number(m)}月`;
});

/* ========= 勤務マスタ読込 ========= */
fetch("master.json")
  .then(r => r.json())
  .then(j => {
    master = j;
    masterLabel.textContent = j.meta.name;
    render();
  });

/* ========= 判定（完全版） ========= */
function classifyDuty(raw){
  const d = (raw || "").normalize("NFKC").trim(); // ★全角→半角

  if(d==="") return {kind:"invalid", label:"未入力"};
  if(d==="-"||d==="－"||d==="ー") return {kind:"off", label:"非番"};

  if(master?.duties?.[d]){
    const def = master.duties[d];
    if(def.off) return {kind:"off", label:"非番"};
    return {kind:"auto", label:"自動", def};
  }

  if(d.startsWith("臨")) return {kind:"manual", label:"臨時（手動）"};
  if(d.startsWith("変")) return {kind:"manual", label:"変行路（手動）"};

  return {kind:"manual", label:"未登録（手動）"};
}

function fmt(def){
  if(!def) return "";
  return `${def.start} → ${def.end}${def.overnight?"（翌日）":""}`;
}

/* ========= 操作 ========= */
btnAdd.onclick = ()=>{
  const duty = dutyInput.value.normalize("NFKC").trim();
  if(!dateInput.value || !duty) return alert("入力してください");
  items.push({date:dateInput.value, duty});
  dutyInput.value="";
  render();
};

btnClear.onclick = ()=>{
  if(confirm("全て消しますか？")){
    items=[]; render();
  }
};

/* ========= 表示 ========= */
function render(){
  if(!items.length){
    previewArea.textContent="まだ入力がありません。";
    return;
  }
  previewArea.innerHTML = items.map(it=>{
    const c = classifyDuty(it.duty);
    return `
      <div class="item">
        <b>${it.date}</b> / <span class="mono">${it.duty}</span><br>
        ${c.kind==="auto" ? `✅ ${fmt(c.def)}` :
          c.kind==="off" ? "— 非番" :
          "⚠ 手動入力"}
      </div>`;
  }).join("");
}
</script>
</body>
</html>
