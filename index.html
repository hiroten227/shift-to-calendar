<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>勤務行路登録</title>

<style>
body{
font-family:sans-serif;
padding:20px;
}

table{
border-collapse:collapse;
width:100%;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.register{
background:#d7f7d7;
}

.skip{
background:#eeeeee;
}

.reject{
background:#ffd6d6;
}
</style>

</head>

<body>

<h2>勤務確認</h2>

<table id="resultTable">
<tr>
<th>日</th>
<th>勤務</th>
<th>判定</th>
<th>時刻</th>
</tr>
</table>

<script>

const sample = [
{date:1,normalized:"401",status:"REGISTER",start:"8:57",end:"9:06"},
{date:2,normalized:"公休",status:"SKIP"},
{date:3,normalized:"臨1900",status:"REGISTER",allDay:true},
{date:4,normalized:"変7d",status:"REGISTER",start:"09:00",end:"17:45"}
]

const table=document.getElementById("resultTable")

sample.forEach(r=>{

const tr=document.createElement("tr")

if(r.status==="REGISTER") tr.className="register"
if(r.status==="SKIP") tr.className="skip"
if(r.status==="REJECT") tr.className="reject"

const time=r.allDay ? "終日" : (r.start ? r.start+"-"+r.end : "")

tr.innerHTML=`
<td>${r.date}</td>
<td>${r.normalized}</td>
<td>${r.status}</td>
<td>${time}</td>
`

table.appendChild(tr)

})

</script>

</body>
</html>
